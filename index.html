 it.changes=it.changes.map(c=>addrify(c));

 if(it.structured&&!it.client_news&&(it.changes.length||it.draft)) it.text='';
 // De-dupe the bullets themselves (producers occasionally write the same change twice).
 it.changes=[...new Set(it.changes.map(c=>c.trim()))];

 const DOMSEG=/^DOM( refreshed)?:?\s*\d+\s*(?:\u2192|->|\u2013|\u2014|to)\s*\d+\.?$/i;  // 2026-06-08: producers drifted to "DOM 40\u219241" (arrow) — match all variants
 it.changes=it.changes

  .map(c=>{

   if(!m) return c;

   return 'Now tracking: '+m[1]+(rest?' — '+rest:'');
  });
 // De-dupe: client_news often restates the changes[] bullets in prose. Drop any client_news
 // sentence whose every property reference already appears in a changes entry. References are
 // reduced to civic number + street name ("163 wychwood") so Ave/Avenue and differing MLS#s
 // still match the same property.
 if(it.client_news&&it.changes.length&&it.text){
  const ct=it.changes.join(' | ').toLowerCase();
  const reduce=r=>{const m=String(r).toLowerCase().match(/^\d+[a-z]?\s+[\w.'-]+/);return m?m[0]:String(r).toLowerCase();};

function splitChanges(text){
 if(!text) return null;
 const m=text.match(/^(.*?\bMLS changes?:\s*)([\s\S]*)$/i);
 let lead='',body=text;
 if(m){lead=m[1].trim();body=m[2];}
 else{
  const semis=(text.match(/; /g)||[]).length;
  if(semis<2||!/->|→/.test(text)) return null;
 }
 const parts=body.split(/;\s+/).map(s=>s.trim()).filter(Boolean);
 if(parts.length<2) return null;
 let rest='';
 const last=parts[parts.length-1];
 const ai=last.search(/->|→/);
 if(ai>=0){
  const after=last.slice(ai);
  const di=after.search(/\.\s/);
  if(di>=0){
   const cut=ai+di+1;
   parts[parts.length-1]=last.slice(0,cut).trim();
   rest=last.slice(cut).trim();
  }
 }
 return {lead,bullets:parts,rest};
}

   The standalone Review tab (🔎) is absorbed here. Buckets are by skill_issues.status
   (To review = open) except Flags, which are pre-ticket pending_followups (category=system).
   The engineering "stage:" status chip is dropped — the tab IS the stage. */
const WS_STAGES=[
 ['flags','Flags','Raw incoming system flags filed by skills, before they become tickets. The bridge promotes them to To review automatically every 2 hours — or tap “Run bridge now”.'],
 ['toreview','To review','Open tickets to triage. Dismiss with a reason or work it in Claude; approve a proposed fix only when one has been authored.'],
 ['inprogress','In progress','A session is actively working or applying the fix.'],
 ['verifying','Verifying','Fix applied and the 5×3 review done — awaiting evidence. Tap “Confirm working”, or let a clean run prove it, to close.'],

];
// bf7eea06: an OPEN ticket a Claude session has CLAIMED (work_started_at set, within this TTL) shows
// In progress the minute work starts — not only once status reaches 'workshopped'. A stale/abandoned
// claim falls back to To review so a crashed session never strands a ticket. The session stamps the
// claim by calling dash_workshop_claim() as its first action (see rvClaudePrompt); the DB clears it the
// moment the ticket leaves 'open'.
const WS_CLAIM_TTL_MS=6*60*60*1000; // 6h
function wsIsClaimedOpen(r){
 if(!r||typeof r!=='object'||r.status!=='open') return false;
 const ws=r.work_started_at;
 if(typeof ws!=='string'||!ws) return false;   // feed casts ::text; guard non-string so a render can't throw
 const t=parseTs(ws); const v=(t instanceof Date)?t.getTime():+t;
 return !!v && !isNaN(v) && (Date.now()-v)<WS_CLAIM_TTL_MS;
}
// map a skill_issues row (or a bare status string — W10 harness back-compat) to its lifecycle bucket.
function wsStatusBucket(r){
 const s=(r&&typeof r==='object')?r.status:r;
 if(s==='open') return wsIsClaimedOpen(r)?'inprogress':'toreview';
 if(s==='workshopped') return 'inprogress';
 if(s==='fix_staged'||s==='deployed'||s==='verified') return 'verifying';
 if(s==='closed') return 'closed';
 if(s==='dismissed') return 'dismissed';
 return 'toreview'; // safety net: an unrecognised status is never invisible
}

  // P2 client-lifecycle: a Firm/Closed file is "collapsed-but-live" — the comps/listing view
  // shows ONLY the subject (seller) / purchased property (buyer). stage comes from the RPC;
  // anything other than a recognised 'firm'/'closed' is treated as 'active' (full view).
  const cstg=((c.stage||'')+'').trim().toLowerCase();const collapsed=(cstg==='firm'||cstg==='closed');
  const sctx={clientId:c.client_id,clientType:c.client_type,supp:suppMap,stage:cstg||'active',collapsed:collapsed,refresh:()=>openClient(c,btn,detail)};
  for(const t of tables){if(cfClassify(t)==='listings')renderListings(t,detail,isSeller,sctx);}
  for(const t of tables){const k=cfClassify(t);
   if(k==='showings')renderShowings(t,detail);
   else if(k==='schedule')renderScheduleTl(t,detail);
   else if(k==='offers')renderOffers(t,detail);
   else if(k==='listtrac')renderListtrac(t,detail);
   else if(k==='other')renderRaw(t,detail);
  }
  detail.appendChild(el('p','sub','Snapshot from '+fmtWhen(parseTs(row.pulled_at))+' — refreshed nightly at 10 PM. Access instructions and internal sync data are not shown. The desktop client-files board reads the live Sheet.'));
 }catch(e){
  detail.textContent='';
  detail.appendChild(el('div','err','Could not load '+c.display_name+': '+e.message));
 }
}

/* ============ Run health port (schedule mirrored nightly into schedule_snapshot) ============ */
const GRACE=0.75;
const SEV={failed:3,error:3,partial:2,success:1};
// scheduled-task id -> runs.skill_name when they differ:
const SKILL_ALIAS={'nightly-mobile-snapshot-22-00':'mobile-snapshot'};
// which run-names write rich telemetry to the runs table:
const RUNS_PRODUCERS={'brokerbay-showings-sync':1,'pending-followups-digest':1,'fireflies-sync':1,'conversation-sync':1,'realm-sync':1,'buyer-sweep':1,'seller-sweep':1,'mobile-snapshot':1};
const DIGESTS_ROW={id:'digests',label:'buyer-digest · seller-digest',due:'on demand',kind:'info',info:'No runs telemetry yet — Phase 1 adds logging so failures here become visible'};
// fallback only if the schedule mirror is unreadable:
const FALLBACK_HEALTH=[
 {id:'sheet-cleanup-1am',label:'sheet-cleanup-1am',due:'1:00 AM',kind:'sched',maxGapH:26},
 {id:'brokerbay-showings-sync',label:'brokerbay-showings-sync',due:'every 2h · 8 AM–8 PM',kind:'multi',slots:[8,10,12,14,16,18,20]},
 {id:'pending-followups-digest',label:'pending-followups-digest',due:'2:50 PM',dueH:14.84,kind:'daily'},
 {id:'fireflies-sync',label:'fireflies-sync',due:'2:55 PM',dueH:14.92,kind:'daily'},
 {id:'conversation-sync',label:'conversation-sync',due:'3:00 PM',dueH:15,kind:'daily'},
 {id:'realm-keepalive',label:'realm-keepalive',due:'every 20 min',kind:'sched',maxGapH:1},
 {id:'listtrac-keepalive',label:'listtrac-keepalive',due:'every 30 min',kind:'sched',maxGapH:1.5},
 {id:'realm-sync',label:'realm-sync',due:'4:30 PM',dueH:16.5,kind:'daily'},
 {id:'buyer-sweep',label:'buyer-sweep',due:'6:00 PM',dueH:18,kind:'daily'},
 {id:'seller-sweep',label:'seller-sweep',due:'7:00 PM',dueH:19,kind:'daily'},
 {id:'mobile-snapshot',label:'nightly-mobile-snapshot-22-00',due:'10:00 PM',dueH:22,kind:'daily'},
 {id:'github-backup-nightly',label:'github-backup-nightly',due:'11:00 PM',kind:'sched',maxGapH:26},
 DIGESTS_ROW
];
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);const h12=((hh+11)%12)+1;return h12+':'+String(mm).padStart(2,'0')+' '+(hh>=12?'PM':'AM');}
function cronParse(ce){
 const f=(ce||'').trim().split(/\s+/);
 if(f.length<5) return null;
 if(f[0].indexOf('*/')===0){return {kind:'freq',stepMin:+f[0].slice(2)||60};}
 const min=+f[0]||0;
 if(f[1]==='*') return {kind:'freq',stepMin:60};
 const hrs=f[1].split(',').map(Number).filter(n=>!isNaN(n));
 if(!hrs.length) return null;
 if(hrs.length>1) return {kind:'multi',slots:hrs.map(x=>x+min/60)};
 return {kind:'daily',dueH:hrs[0]+min/60};
}
function buildSkills(rows){
 const out=[];let mirror=null;
 for(const t of rows){
  if(!t||!t.task_id) continue;
  const m=parseTs(t.mirrored_at); if(m&&(!mirror||m>mirror)) mirror=m;
  const runName=SKILL_ALIAS[t.task_id]||t.task_id;
  if(t.enabled===false){out.push({id:runName,label:t.task_id,due:'disabled',kind:'info',info:'Scheduled task is currently disabled'});continue;}
  const c=cronParse(t.cron);
  if(RUNS_PRODUCERS[runName]&&c&&c.kind==='multi') out.push({id:runName,label:t.task_id,due:'slots '+fmtH(c.slots[0])+'–'+fmtH(c.slots[c.slots.length-1]),kind:'multi',slots:c.slots});
  else if(RUNS_PRODUCERS[runName]&&c&&c.kind==='daily') out.push({id:runName,label:t.task_id,due:fmtH(c.dueH),dueH:c.dueH,kind:'daily'});
  else{
   let due=t.schedule_desc||'',maxGapH=26;
   if(c&&c.kind==='freq'){due='every '+c.stepMin+' min';maxGapH=Math.max(0.5,(c.stepMin*3)/60);}
   else if(c&&c.kind==='daily'){due=fmtH(c.dueH);maxGapH=25;}
   else if(c&&c.kind==='multi'){due='slots '+fmtH(c.slots[0])+'–'+fmtH(c.slots[c.slots.length-1]);maxGapH=4;}
   out.push({id:runName,label:t.task_id,due:due,kind:'sched',maxGapH:maxGapH,last:t.last_run_at,mirror:t.mirrored_at});
  }
 }
 out.sort((a,b)=>a.id.localeCompare(b.id));
 out.push(DIGESTS_ROW);
 return {skills:out,mirror:mirror};
}
function pill(kind,txt){const sty={g:['#e1f5ee','#085041'],a:['#faeeda','#854f0b'],r:['#fcebeb','#791f1f'],n:['#f1efe8','#5f5e5a']}[kind];const p=el('span','statpill',txt);p.style.background=sty[0];p.style.color=sty[1];return p;}
async function loadHealth(){
 const main=document.getElementById('v-health');
 main.textContent='';setBanner('loading…','n');
 try{
  const [runs,pfs,sched,hbRows]=await Promise.all([rpc('dash_runs_recent'),rpc('dash_pf_open',{p_chars:200}),rpc('dash_schedule').then(r=>r,()=>[]),rpc('dash_skill_health').then(r=>r,()=>[])]);
  let skills=FALLBACK_HEALTH,schedOk=false,mirror=null;
  if(Array.isArray(sched)&&sched.length){const b=buildSkills(sched);skills=b.skills;mirror=b.mirror;schedOk=true;}
  // W14: heartbeats read LIVE via dash_skill_health (the one telemetry source that doesn't wait for the 10 PM mirror)
  const HB={};if(Array.isArray(hbRows))for(const h of hbRows)HB[h.skill_name]=h;
  renderHealth(skills,runs,pfs,schedOk,mirror,HB);
 }catch(e){errBox(main,'Could not load run data: '+e.message,loadHealth);}
}
function renderHealth(HEALTH_SKILLS,runs,pfs,schedOk,mirror,HB){
 HB=HB||{};
 const main=document.getElementById('v-health');
 main.textContent='';
 main.appendChild(el('p','sub',new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'long',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}).format(new Date())+' (Toronto) — pulled live from the runs table.'));
 const mirrorAgeH=mirror?(Date.now()-mirror.getTime())/3600000:null;
 if(schedOk&&mirrorAgeH!==null&&mirrorAgeH>26) main.appendChild(el('div','err','⚠ The schedule mirror is '+Math.round(mirrorAgeH)+'h old — the 10 PM snapshot task may not be running. Check its row below.'));
 const issues=pfs.filter(p=>p.category==='system');
 // Decisions "waiting" = broker's turn only; rows answered (awaiting_claude) or in-flight (claude_working) are on Claude's plate.
 const decisions=pfs.filter(p=>{if(p.category==='system')return false;const t=p.turn_state||'awaiting_broker';return t!=='awaiting_claude'&&t!=='claude_working';}).length;
 const today=torDate(new Date()),nowH=torNowH();
 let green=0,due=0,attention=0;
 runs.forEach(r=>{r._d=parseTs(r.started_at);r._day=r._d?torDate(r._d):'';});
 const rowsBox=el('div');
 for(const sk of HEALTH_SKILLS){
  const row=el('div','row');
  const dot=el('span','dot');
  const body=el('div');body.style.flex='1';body.style.minWidth='0';
  const head=el('div');
  head.appendChild(el('span','nm',sk.label));
  head.appendChild(el('span','tm',sk.due));
  body.appendChild(head);
  let p,kindCol='#b4b2a9';
  if(sk.kind==='info'){
   body.appendChild(el('div','nt',sk.info));
   p=pill('n',sk.id==='digests'?'on demand':'not tracked');
  }else if(sk.kind==='sched'){
   // W14 telemetry priority (ported from desktop): skill_health heartbeat (LIVE, written by the
   // task itself at end-of-run) -> scheduler fire times AS OF the nightly 10 PM mirror -> honest gap.
   const hb=HB[(sk.id||'').replace(/-(1am|nightly)$/,'')];
   const okAt=hb&&hb.ok_at?parseTs(hb.ok_at):null;
   const okAgeH=okAt?(Date.now()-okAt.getTime())/3600000:Infinity;
   // 8fac606a liveness: last_run_at advances on EVERY run regardless of status (eaffab7c), so it
   // catches a producer that DIED while last_run_status was frozen at a non-success value ('partial').
   // liveness = most-recent of last_run_at and last_successful_run_at; liveStale = POSITIVE evidence
   // (>=1 real timestamp) that no run has happened within cadence. No timestamps (heartbeat-only
   // producers, or pre-RPC-deploy) => NOT stale — never fabricate a death from zero evidence.
   const liveAt=hb&&hb.last_run_at?parseTs(hb.last_run_at):null;
   const liveMs=Math.max(liveAt?liveAt.getTime():0, okAt?okAt.getTime():0);
   const liveAgeH=liveMs>0?(Date.now()-liveMs)/3600000:Infinity;
   const liveStale=liveMs>0&&liveAgeH>sk.maxGapH;
   if(hb&&(okAt||hb.last_run_status)){
    due++;
    const quiet=hb.excluded_from_alarms===true;
    if(hb.last_run_status==='success'&&okAgeH<=sk.maxGapH){p=pill('g','ran clean');kindCol='#1d9e75';green++;body.appendChild(el('div','nt','Heartbeat: succeeded '+torTime(okAt)+(okAgeH>20?' ('+fmtDay(okAt)+')':'')));}
    else if(hb.last_run_status&&hb.last_run_status!=='success'&&liveStale&&!quiet){p=pill('r','stalled');kindCol='#e24b4a';attention++;body.appendChild(el('div','nt','No run in '+Math.round(liveAgeH)+'h (last status '+hb.last_run_status+') — beyond its ~'+Math.round(sk.maxGapH)+'h cadence, so the producer has stalled'+(okAt?'; last clean run '+fmtDay(okAt)+' '+torTime(okAt):'')));}
    else if(hb.last_run_status&&hb.last_run_status!=='success'){p=pill(quiet?'a':'r',hb.last_run_status);kindCol=quiet?'#ef9f27':'#e24b4a';if(!quiet)attention++;body.appendChild(el('div','nt','Heartbeat reports '+hb.last_run_status+(okAt?' — last clean run '+fmtDay(okAt)+' '+torTime(okAt):'')));}
    else if(okAt&&okAgeH>sk.maxGapH){if(quiet){p=pill('a','gap (expected)');kindCol='#ef9f27';body.appendChild(el('div','nt','Last clean heartbeat '+fmtDay(okAt)+' '+torTime(okAt)+' — gaps are expected for this task (Mac asleep)'));}else{p=pill('r','stalled');kindCol='#e24b4a';attention++;body.appendChild(el('div','nt','Last clean heartbeat '+fmtDay(okAt)+' '+torTime(okAt)+' — '+Math.round(okAgeH)+'h ago, beyond its ~'+Math.round(sk.maxGapH)+'h cadence'));}}
    else{p=pill('n','heartbeat incomplete');body.appendChild(el('div','nt','Heartbeat row exists but carries no status/timestamp yet — expecting a report on its next run'));}
   }else{
   const last=parseTs(sk.last), mir=parseTs(sk.mirror);
   const asof=mir?(fmtDay(mir)+' '+torTime(mir)):'last';
   const ageH=(last&&mir)?(mir.getTime()-last.getTime())/3600000:Infinity;
   due++;
   if(!last){p=pill('a','never fired');kindCol='#ef9f27';attention++;body.appendChild(el('div','nt','Scheduler had no record of a run as of the '+asof+' mirror'));}
   else if(ageH<=sk.maxGapH){p=pill('g','fired');kindCol='#1d9e75';green++;body.appendChild(el('div','nt','Last fired '+fmtDay(last)+' '+torTime(last)+' (as of the '+asof+' mirror) — fired ≠ verified success'));}
   else{p=pill('r','stalled');kindCol='#e24b4a';attention++;body.appendChild(el('div','nt','Last fired '+fmtDay(last)+' '+torTime(last)+' — '+Math.round(ageH)+'h beyond cadence as of the '+asof+' mirror'));}
   }
  }else{
   const mine=runs.filter(r=>r.skill_name===sk.id&&r._day===today);
   const prev=runs.filter(r=>r.skill_name===sk.id&&r._day!==today);
   if(sk.kind==='multi'){
    const expected=sk.slots.filter(h=>h<=nowH-0.2).length;
    const got=mine.length;
    if(expected>0)due++;
    const worst=Math.max(0,...mine.map(r=>SEV[r.status]||2));
    if(got===0&&expected>0){p=pill('r','missed');kindCol='#e24b4a';attention++;}
    else if(got===0){p=pill('n','due 8:00 AM');}
    else if(worst>=3){p=pill('r','failed');kindCol='#e24b4a';attention++;}
    else if(worst===2||got<expected){p=pill('a','check');kindCol='#ef9f27';attention++;}
    else{p=pill('g','ran clean');kindCol='#1d9e75';green++;}
    body.appendChild(el('div','nt',got+'/'+expected+' fires so far today'+(mine[0]&&mine[0].notes?' · latest: '+mine[0].notes.slice(0,110):'')));
   }else{
    if(mine.length===0){
     if(nowH>sk.dueH+GRACE){p=pill('r','missed');kindCol='#e24b4a';due++;attention++;body.appendChild(el('div','nt','No run logged today — was due '+sk.due+(prev[0]?' · yesterday: '+prev[0].status:'')));}
     else if(nowH>=sk.dueH){p=pill('n','due now');body.appendChild(el('div','nt','In its run window'));}
     else{p=pill('n','due '+sk.due);if(prev[0])body.appendChild(el('div','nt','Yesterday: '+prev[0].status+(prev[0].notes?' — '+prev[0].notes.slice(0,100):'')));}
    }else{
     due++;
     const worst=Math.max(...mine.map(r=>SEV[r.status]||2));
     const worstRow=mine.find(r=>(SEV[r.status]||2)===worst);
     const t=torTime(worstRow._d);
     if(worst>=3){p=pill('r','failed');kindCol='#e24b4a';attention++;}
     else if(worst===2){p=pill('a','partial');kindCol='#ef9f27';attention++;}
     else{p=pill('g','ran clean');kindCol='#1d9e75';green++;}
     body.appendChild(el('div','nt',mine.length+(mine.length>1?' rows':' row')+' · '+t+(worstRow.notes?' — '+worstRow.notes.slice(0,130):'')));
    }
   }
   if(p&&(p.textContent==='missed'||p.textContent==='failed'||p.textContent==='partial')){
    const b=el('button',null,'Copy "investigate" for Claude');
    b.style.marginTop='6px';
    b.onclick=()=>copyPrompt(wsPromptRunHealth(sk.id,p.textContent),b);
    body.appendChild(b);
   }
  }
  dot.style.background=kindCol;
  row.appendChild(dot);row.appendChild(body);if(p)row.appendChild(p);
  rowsBox.appendChild(row);
 }
 main.appendChild(rowsBox);
 const cards=el('div','cards');
 const mk=(l,v,s)=>{const c=el('div','card');c.appendChild(el('div','cl',l));c.appendChild(el('div','cv',String(v)));if(s)c.appendChild(el('div','cs',s));return c;};
 cards.appendChild(mk('Cron skills green today',green+' / '+due));
 cards.appendChild(mk('Decisions waiting',decisions,'on the follow-ups board'));
 cards.appendChild(mk('Skill flags',issues.length,'on the workshop board'));
 cards.appendChild(mk('Runs logged (40h)',runs.length));
 main.appendChild(cards);
 main.appendChild(el('p','sub',(schedOk?'Tracking every task on the schedule, mirrored nightly at 10 PM by the snapshot task'+(mirror?' (mirror as of '+fmtDay(mirror)+' '+torTime(mirror)+')':'')+'. ':'⚠ Schedule mirror unreachable — using the built-in fallback list, which can drift. ')+'Skills that write runs rows get full live status; scheduler-only tasks are judged by fire times as of the nightly mirror. The desktop board reads the scheduler live and stays canonical.'));
 renderHealth._banner=attention>0?[green+' green · '+attention+' need a look','a']:['All clear — '+green+' of '+due+' due ran clean','g'];
 setBanner(...renderHealth._banner);
}

 main.textContent='';
 const {data:s}=await sb.auth.getSession();
 const email=s&&s.session&&s.session.user?s.session.user.email:'';
 setBanner(email||'account','n');
 const card1=el('div','item');

 const f2=el('div','field');const l2=el('label',null,'New password again');const i2=document.createElement('input');i2.type='password';i2.autocomplete='new-password';f2.appendChild(l2);f2.appendChild(i2);

 };
 card1.appendChild(cb);card1.appendChild(msg);

 const card2=el('div','item');
 card2.appendChild(el('div','title','Signed in as'));
 card2.appendChild(el('p','sub',email));
 const so=el('button',null,'Sign out');
 so.onclick=async()=>{await sb.auth.signOut();showLogin();};
 card2.appendChild(so);
 main.appendChild(card2);
 // Notifications (issue a18f9eae) — Web Push subscribe/unsubscribe + device-capability guidance
 const cardN=el('div','item');
 cardN.appendChild(el('div','title','Notifications'));
 cardN.appendChild(el('p','sub','Get a notification when a new item lands in Updates, Follow-ups, or Workshop — even when the app is closed, as long as your browser is running.'));
 const nbtn=el('button',null,'…'); nbtn.disabled=true;
 const nmsg=el('div','mutedtxt','');
 cardN.appendChild(nbtn); cardN.appendChild(nmsg);
 main.appendChild(cardN);
 (async()=>{
  // 99a2fa1e: on iOS, Web Push works ONLY from the installed (Home-Screen/standalone) PWA — a plain Safari
  // tab on iOS 16.4+ reports PushManager+Notification present but pushManager.subscribe() rejects. Gate on
  // install-state FIRST so a tab shows the Add-to-Home-Screen guidance instead of a button that silently fails.
  const IS_IOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(/Macintosh/.test(navigator.userAgent)&&navigator.maxTouchPoints>1);
  const IS_STANDALONE=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||navigator.standalone===true;
  if(IS_IOS&&!IS_STANDALONE){
   nbtn.style.display='none';
   nmsg.textContent='On iPhone/iPad: first add this to your Home Screen (Share → Add to Home Screen), then open it from there — notifications can only be turned on from the installed app.';
   return;
  }
  if(!PUSH_SUPPORTED){
   nbtn.style.display='none';
   const ios=/iP(hone|ad|od)/.test(navigator.userAgent);
   const standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||navigator.standalone;
   nmsg.textContent = (ios&&!standalone)
    ? 'On iPhone/iPad: first add this to your Home Screen (Share → Add to Home Screen), then open it from there — notifications can only be turned on from the installed app.'
    : 'This browser can’t show notifications. Try Chrome or Safari, or open the app from your Home Screen.';
   return;
  }
  if(!PUSH_CONFIGURED){
   nbtn.style.display='none';
   nmsg.textContent='Notifications aren’t switched on for this site yet — check back soon.';
   return;
  }
  if(Notification.permission==='denied'){
   nbtn.style.display='none';
   nmsg.textContent='Notifications are blocked for this site in your browser settings. Allow them there, then reopen this page.';
   return;
  }
  let sub=null; try{ sub=await pushCurrent(); }catch(e){}
  function paint(on){
   nbtn.disabled=false; nbtn.className=on?'':'primary';
   nbtn.textContent=on?'Turn off notifications':'Turn on notifications';
   nmsg.textContent=on?'On — this device will be notified.':'';
  }
  paint(!!sub);
  nbtn.onclick=async()=>{
   const wasOn=!!(await pushCurrent().catch(()=>null));
   nbtn.disabled=true; nbtn.textContent='…';
   try{
    if(wasOn){ await pushUnsubscribe(); paint(false); }
    else { await pushSubscribe(); paint(true); }
   }catch(e){
    const m=String((e&&e.message)||e);
    paint(wasOn);
    nmsg.textContent = m.startsWith('permission') ? 'You’ll need to allow notifications to turn this on.'
                      : (m==='not-configured' ? 'Notifications aren’t switched on for this site yet — check back soon.' : m==='unsupported' ? 'This browser can’t show notifications.' : ('Could not change notifications: '+m));
   }
  };
 })();
 const card3=el('div','item');
 card3.appendChild(el('div','title','About'));
 card3.appendChild(el('p','sub','Forest Hill boards on your phone — the same four boards as the desktop dashboards, read straight from your private database over an authenticated session. Desktop stays the place for editing and for talking to Claude; this view is for reading and checking things off. Tip: in Safari, Share → Add to Home Screen makes this open like an app.'));
 main.appendChild(card3);
}
