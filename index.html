<script>
'use strict';
/* W12 mobile dashboard — canonical source: FIX CLAUDE/dashboards/mobile/index.html
   Deployed as GitHub Pages (public repo rebeccaph91/fh-boards — STATIC SHELL ONLY:
   no client data, no secrets; the publishable key below is public by design).
   Data access: Supabase Auth session + SECURITY DEFINER dash_* RPCs only (no table

   surface; this app is read + check-off. Edit here, then git push from the repo. */
const SBURL='https://assjjuhxsgfeiajjsthx.supabase.co';
const SBKEY='sb_publishable_hQeONAvb0M2RBnRERwdqfw_JwfkjIB6'; // publishable key — safe to embed
const TZ='America/Toronto';
const UUID=/^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
const sb=window.supabase.createClient(SBURL,SBKEY);

async function rpc(name,args){
 const {data,error}=await sb.rpc(name,args||{});
 if(error){
  if(/JWT|expired|not authorized|401/i.test(error.message||'')){
   const {data:s}=await sb.auth.getSession();
   if(!s||!s.session){showLogin();throw new Error('Signed out — please sign in again.');}
  }
  throw new Error(error.message||'request failed');
 }
 return data||[];
}
function el(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function parseTs(s){if(!s)return null;let t=s.replace(' ','T');if(/[+-]\d\d$/.test(t))t+=':00';const d=new Date(t);return isNaN(d)?null:d;}
function fmtWhen(d){return d?new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}).format(d):'';}
function fmtDay(d){return d?new Intl.DateTimeFormat('en-US',{timeZone:TZ,month:'short',day:'numeric'}).format(d):'';}
function torTime(d){return new Intl.DateTimeFormat('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit'}).format(d);}
function torDate(d){return new Intl.DateTimeFormat('en-CA',{timeZone:TZ}).format(d);}
function torNowH(){const p=new Intl.DateTimeFormat('en-US',{timeZone:TZ,hour12:false,hour:'2-digit',minute:'2-digit'}).formatToParts(new Date());const g=t=>{const x=p.find(y=>y.type===t);return x?+x.value:0;};return g('hour')%24+g('minute')/60;}
// copy-to-clipboard with inline fallback (phones can't hand a prompt to Claude directly)
function copyPrompt(t,b){
 if(b&&b._askbox){b._askbox.remove();b._askbox=null;return;}
 const x=document.createElement('textarea');
 x.value=t;x.readOnly=true;x.rows=3;x.className='copybox';
 x.onclick=()=>x.select();
 const lbl=el('div','mutedtxt','Copied — paste it into a Claude chat on your computer (text below as backup):');
 if(b&&b.parentNode){b.insertAdjacentElement('afterend',x);b.insertAdjacentElement('afterend',lbl);b._askbox=x;}
 else document.body.appendChild(x);
 const _rm=x.remove.bind(x);x.remove=()=>{lbl.remove();_rm();};
 try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).catch(()=>{lbl.textContent='Copy this and paste it into a Claude chat on your computer:';});}catch(e){}
}
function setBanner(txt,kind){
 const b=document.getElementById('banner');
 b.textContent=txt;
 const sty={g:['#e1f5ee','#085041'],a:['#faeeda','#854f0b'],r:['#fcebeb','#791f1f'],n:['#f1efe8','#5f5e5a']}[kind||'n'];
 b.style.background=sty[0];b.style.color=sty[1];
}
function errBox(box,msg,retry){
 const eb=el('div','err',msg+' ');
 const rb=el('button',null,'Retry');rb.onclick=retry;eb.appendChild(rb);
 box.appendChild(eb);setBanner('error','r');
}

/* ============ navigation ============ */
const TITLES={updates:'Client updates',clients:'Client files',followups:'Follow-ups',workshop:'Workshop',health:'Run health',settings:'Account'};
let current='updates';
const loaded={};
function show(view){
 current=view;
 document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===view));
 ['updates','clients','followups','workshop','health','settings'].forEach(v=>document.getElementById('v-'+v).classList.toggle('hidden',v!==view));
 document.getElementById('viewtitle').textContent=TITLES[view];
 setBanner('…','n');
 if(!loaded[view]){loaded[view]=true;LOADERS[view]();}
 else if(view==='settings')LOADERS.settings();
 else REBANNER[view]();
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>show(t.dataset.v));
document.getElementById('acct').onclick=()=>show('settings');
document.getElementById('refresh').onclick=()=>{loaded[current]=true;LOADERS[current]();};

/* ============ auth ============ */
function showLogin(){document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');for(const k in loaded)delete loaded[k];
 // W14: deep links from the retired Cowork pointer cards (#health/#updates/#followups/#workshop/#clients)
 const h=(location.hash||'').replace('#','');
 show(['updates','clients','followups','workshop','health'].includes(h)?h:'updates');}
document.getElementById('signin').onclick=async()=>{
 const btn=document.getElementById('signin'),errb=document.getElementById('loginerr');
 errb.classList.add('hidden');btn.disabled=true;btn.textContent='Signing in…';
 try{
  const {error}=await sb.auth.signInWithPassword({email:document.getElementById('em').value.trim(),password:document.getElementById('pw').value});
  if(error)throw error;
  document.getElementById('pw').value='';
  showApp();
 }catch(e){errb.textContent=e.message||'Sign-in failed';errb.classList.remove('hidden');}
 btn.disabled=false;btn.textContent='Sign in';
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('signin').click();});

/* ============ Updates (client-updates port) ============ */
let cuShowDismissed=false, cuDISM={}, cuMLSADDR={};
function addrify(t){if(!t)return t;return t.replace(/\bcomp\s*#?\d*[,:]?\s+([CWENX]\d{7,8})\b/gi,(m,mls)=>cuMLSADDR[mls]?cuMLSADDR[mls]+' ('+mls+')':m);}
const BOOKKEEP=/overlap guard|realm cache|listtrac no-op|conversation quiet|comps? refreshed|status=(success|partial|failed)|^pre-MLS:|no-op \(pre-MLS\)|cache-consumer|row-writes|watermark|helper modules|consumed from/i;
function stripBookkeeping(t){if(!t)return t;const parts=t.split(/(?<=[.;])\s+/).filter(s=>!BOOKKEEP.test(s.trim()));return parts.join(' ').replace(/\s{2,}/g,' ').trim();}
function parseItem(row){
 const it={id:row.id, skill:row.skill_name, when:parseTs(row.started_at), status:row.status, text:'', changes:[]};
 const n=row.notes||'';
 if(n.trim().startsWith('{')){
  try{const o=JSON.parse(n); it.text=o.summary||n; if(Array.isArray(o.changes)) it.changes=o.changes.map(String); if(typeof o.draft==='string'&&o.draft.trim()) it.draft=o.draft; else if(Array.isArray(o.drafts)&&o.drafts.length) it.draft=o.drafts.map(String).join('\n\n'); if(typeof o.client_news==='string'&&o.client_news.trim()&&o.client_news.trim().toLowerCase()!=='null'){it.client_news=o.client_news.trim();it.text=it.client_news;} it.structured=true;}catch(e){it.text=n;}
 }else it.text=n;
 it.text=(it.text||'').replace(/^\s*(buyer|seller)[- ]sweep\s*[:—–-]\s*/i,'');
 if(row.skill_name==='seller-sweep'&&row.seller_address){
  const label=row.seller_address+(row.seller_mls?' ('+row.seller_mls+')':'');
  it.text=(it.text||'').replace(/\b(?:the\s+)?subject(?!\s+to\b)(?:\s+property|\s+listing)?\b/gi,label);
 }
 it.text=stripBookkeeping(addrify(it.text));
 it.changes=it.changes.map(c=>addrify(c));
 // Contract rule: summary is internal bookkeeping — NEVER shown when changes/draft exist and
 // there is no client_news (it was leaking "sources fresh; rows=N; ..." onto the board).
 if(it.structured&&!it.client_news&&(it.changes.length||it.draft)) it.text='';
 // De-dupe the bullets themselves (producers occasionally write the same change twice).
 it.changes=[...new Set(it.changes.map(c=>c.trim()))];
 // Broker rules (2026-06-06): backfilled data is bookkeeping, not news; DOM ticking up is not news.
 const DOMSEG=/^DOM( refreshed)?:?\s*\d+\s*(?:\u2192|->|\u2013|\u2014|to)\s*\d+\.?$/i;  // 2026-06-08: producers drifted to "DOM 40\u219241" (arrow) — match all variants
 it.changes=it.changes
  .filter(c=>!/backfill|resolved by address match|provenance logged|address[- ]match \(chrome\)|mls#? re-?resolved|\(historical\)/i.test(c))  // 2026-06-08: sheet-repair bullets are bookkeeping, not news
  .map(c=>{
   const i=c.indexOf(': ');
   const pre=i<0?'':c.slice(0,i), body=(i<0?c:c.slice(i+2));
   const segs=body.split(/;\s*/).map(s=>s.replace(/^DOM( refreshed)?:?\s*\d+\s*(?:\u2192|->|\u2013|\u2014|to)\s*\d+\s*(?:,\s*|$)/i,'').replace(/,\s*DOM( refreshed)?:?\s*\d+\s*(?:\u2192|->|\u2013|\u2014|to)\s*\d+\.?\s*$/i,'').trim()).filter(s=>s&&!DOMSEG.test(s));  // also strip a leading DOM-tick from mixed segments
   return segs.length?(pre?pre+': ':'')+segs.join('; '):'';
  })
  .filter(c=>c!=='')
  // Broker rule (2026-06-06): "appended" reads as jargon — rephrase as a tracking confirmation.
  .map(c=>{
   const m=c.match(/^(.*?):\s*(?:appended|stub filled)(?:,|\s*[\u2014\u2013-]\s*|\s|$)\s*(.*)$/i);  // 2026-06-08: stub-filled = same jargon family as appended
   if(!m) return c;
   const rest=m[2].replace(/^[,\s]+/,'').trim();
   return 'Now tracking: '+m[1]+(rest?' — '+rest:'');
  });
 // De-dupe: client_news often restates the changes[] bullets in prose. Drop any client_news
 // sentence whose every property reference already appears in a changes entry. References are
 // reduced to civic number + street name ("163 wychwood") so Ave/Avenue and differing MLS#s
 // still match the same property.
 if(it.client_news&&it.changes.length&&it.text){
  const ct=it.changes.join(' | ').toLowerCase();
  const reduce=r=>{const m=String(r).toLowerCase().match(/^\d+[a-z]?\s+[\w.'-]+/);return m?m[0]:String(r).toLowerCase();};
  it.text=it.text.split(/(?<=[.;])\s+/).filter(sn=>{
   const mls=(sn.match(/[CWENX]\d{7,8}/gi)||[]).map(x=>x.toLowerCase());
   const adr=(sn.match(/\d+[A-Za-z]?\s+[A-Z][\w.'-]+(?:\s+[A-Z][\w.'-]+)*(?:\s+(?:Rd|Road|St|Street|Ave|Avenue|Dr|Drive|Crt|Court|Cres|Crescent|Lane|Ln|Blvd|Way|Pkwy|Circle|Cir|Trail|Gate|Grove|Terrace|Sq|Pl|Place|Pt)\b)?/g)||[]).map(reduce)
    .filter(r=>!/\s(dom|am|pm|hrs?|mins?|days?|beds?|baths?|sqft|showings?|offers?|comps?|views?|dollars?|k|m)$/i.test(r));
   const refs=mls.concat(adr);
   if(!refs.length) return true;                 // no property reference -> genuinely new prose, keep
   return !refs.every(r=>ct.includes(r));        // every reference already in the bullets -> restatement, drop
  }).join(' ').trim();
 }
 return it;
}
function classify(it){
 const raw=(it.text||'').toLowerCase();
 const t=raw.replace(/\b0 (relist|new comp|offer|showing)[^;.]*/g,'').replace(/no (genuine )?(mls|comp|sheet) changes/g,'').replace(/\(skipped\)/g,'');
 const tags=[];
 if(it.client_news) tags.push('client news');
 if(/draft (text|ready|prepared)|text draft|draft:/.test(t)&&!/no draft/.test(t)) tags.push('draft to send');
 if(it.changes.length) tags.push('market change');
 else if(!it.structured&&/price (change|drop|increase|raised|reduced)|raised to|reduced to|sold firm|sold conditional|terminated|expired|suspended|relist(ed)?\b|new comp|back on (the )?market|came on (the )?market|offer (registered|presented)|home inspection ->/.test(t)) tags.push('market change');
 if(/showing feedback|feedback from (the )?(buyer'?s? )?agent|open house (result|attendance)|showing(s)? (booked|requested)/.test(t)) tags.push('showing news');
 const nothingNew=/no new writes|already (appended|recorded|tagged|on the sheet|noted|captured in)|nothing new|first-ever sweep watermark/.test(t);
 if(nothingNew&&!it.changes.length) return tags.filter(tg=>tg==='draft to send'||tg==='client news');
 if(/backfill|back-?fill(ed|ing)?|first[- ](ever[- ])?(build|sweep|pass)|initial (build|population|seed)|seeded|catch-?up (pass|write)|carried over|baseline (established|set)|populating (the )?sheet|migration pass/.test(t)) return tags.filter(tg=>tg==='draft to send'||tg==='client news');
 if(/(appended (as )?stub|stub row)/.test(t)&&/pf filed|unresolved/.test(t)) return tags.filter(tg=>tg==='draft to send'||tg==='client news');
 if(/broker (already )?shared/.test(t)&&!it.changes.length) return tags.filter(tg=>tg==='draft to send'||tg==='client news');
 return tags;
}
function isMaterial(it){return classify(it).length>0;}
function splitChanges(text){
 if(!text) return null;
 const m=text.match(/^(.*?\bMLS changes?:\s*)([\s\S]*)$/i);
 let lead='',body=text;
 if(m){lead=m[1].trim();body=m[2];}
 else{
  const semis=(text.match(/; /g)||[]).length;
  if(semis<2||!/->|→/.test(text)) return null;
 }
 const parts=body.split(/;\s+/).map(s=>s.trim()).filter(Boolean);
 if(parts.length<2) return null;
 let rest='';
 const last=parts[parts.length-1];
 const ai=last.search(/->|→/);
 if(ai>=0){
  const after=last.slice(ai);
  const di=after.search(/\.\s/);
  if(di>=0){
   const cut=ai+di+1;
   parts[parts.length-1]=last.slice(0,cut).trim();
   rest=last.slice(cut).trim();
  }
 }
 return {lead,bullets:parts,rest};
}
function appendText(box,text){
 const s=splitChanges(text);
 if(s){
  if(s.lead) box.appendChild(el('div','txt',s.lead));
  const ul=el('ul','chg2');
  for(const p of s.bullets) ul.appendChild(el('li',null,p));
  box.appendChild(ul);
  if(s.rest){
   const sentences=s.rest.split(/\.\s+/).map(x=>x.trim()).filter(Boolean).map(x=>/[.!?]$/.test(x)?x:x+'.');
   for(const sn of sentences) box.appendChild(el('div','txt',sn));
  }
 } else box.appendChild(el('div','txt',text));
}

   const isSep=cells.length>0&&cells.every(c=>c===''||/^:?-+:?$/.test(c))&&cells.some(c=>/-/.test(c));

function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);const h12=((hh+11)%12)+1;return h12+':'+String(mm).padStart(2,'0')+' '+(hh>=12?'PM':'AM');}
function cronParse(ce){
 const f=(ce||'').trim().split(/\s+/);
 if(f.length<5) return null;
 if(f[0].indexOf('*/')===0){return {kind:'freq',stepMin:+f[0].slice(2)||60};}
 const min=+f[0]||0;
 if(f[1]==='*') return {kind:'freq',stepMin:60};
 const hrs=f[1].split(',').map(Number).filter(n=>!isNaN(n));
 if(!hrs.length) return null;
 if(hrs.length>1) return {kind:'multi',slots:hrs.map(x=>x+min/60)};
 return {kind:'daily',dueH:hrs[0]+min/60};
}
function buildSkills(rows){
 const out=[];let mirror=null;
 for(const t of rows){
  if(!t||!t.task_id) continue;
  const m=parseTs(t.mirrored_at); if(m&&(!mirror||m>mirror)) mirror=m;
  const runName=SKILL_ALIAS[t.task_id]||t.task_id;
  if(t.enabled===false){out.push({id:runName,label:t.task_id,due:'disabled',kind:'info',info:'Scheduled task is currently disabled'});continue;}
  const c=cronParse(t.cron);
  if(RUNS_PRODUCERS[runName]&&c&&c.kind==='multi') out.push({id:runName,label:t.task_id,due:'slots '+fmtH(c.slots[0])+'–'+fmtH(c.slots[c.slots.length-1]),kind:'multi',slots:c.slots});
  else if(RUNS_PRODUCERS[runName]&&c&&c.kind==='daily') out.push({id:runName,label:t.task_id,due:fmtH(c.dueH),dueH:c.dueH,kind:'daily'});
  else{
   let due=t.schedule_desc||'',maxGapH=26;
   if(c&&c.kind==='freq'){due='every '+c.stepMin+' min';maxGapH=Math.max(0.5,(c.stepMin*3)/60);}
   else if(c&&c.kind==='daily'){due=fmtH(c.dueH);maxGapH=25;}
   else if(c&&c.kind==='multi'){due='slots '+fmtH(c.slots[0])+'–'+fmtH(c.slots[c.slots.length-1]);maxGapH=4;}
   out.push({id:runName,label:t.task_id,due:due,kind:'sched',maxGapH:maxGapH,last:t.last_run_at,mirror:t.mirrored_at});
  }
 }
 out.sort((a,b)=>a.id.localeCompare(b.id));
 out.push(DIGESTS_ROW);
 return {skills:out,mirror:mirror};
}

 main.appendChild(el('p','sub',new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'long',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}).format(new Date())+' (Toronto) — pulled live from the runs table.'));
 const mirrorAgeH=mirror?(Date.now()-mirror.getTime())/3600000:null;
 if(schedOk&&mirrorAgeH!==null&&mirrorAgeH>26) main.appendChild(el('div','err','⚠ The schedule mirror is '+Math.round(mirrorAgeH)+'h old — the 10 PM snapshot task may not be running. Check its row below.'));
 const issues=pfs.filter(p=>p.category==='system');
 // Decisions "waiting" = broker's turn only; rows answered (awaiting_claude) or in-flight (claude_working) are on Claude's plate.
 const decisions=pfs.filter(p=>{if(p.category==='system')return false;const t=p.turn_state||'awaiting_broker';return t!=='awaiting_claude'&&t!=='claude_working';}).length;
 const today=torDate(new Date()),nowH=torNowH();
 let green=0,due=0,attention=0;
 runs.forEach(r=>{r._d=parseTs(r.started_at);r._day=r._d?torDate(r._d):'';});
 const rowsBox=el('div');
 for(const sk of HEALTH_SKILLS){
  const row=el('div','row');
  const dot=el('span','dot');
  const body=el('div');body.style.flex='1';body.style.minWidth='0';
  const head=el('div');
  head.appendChild(el('span','nm',sk.label));
  head.appendChild(el('span','tm',sk.due));
  body.appendChild(head);
  let p,kindCol='#b4b2a9';
  if(sk.kind==='info'){
   body.appendChild(el('div','nt',sk.info));
   p=pill('n',sk.id==='digests'?'on demand':'not tracked');
  }else if(sk.kind==='sched'){
   // W14 telemetry priority (ported from desktop): skill_health heartbeat (LIVE, written by the
   // task itself at end-of-run) -> scheduler fire times AS OF the nightly 10 PM mirror -> honest gap.
   const hb=HB[(sk.id||'').replace(/-(1am|nightly)$/,'')];
   const okAt=hb&&hb.ok_at?parseTs(hb.ok_at):null;
   const okAgeH=okAt?(Date.now()-okAt.getTime())/3600000:Infinity;
   if(hb&&(okAt||hb.last_run_status)){
    due++;
    const quiet=hb.excluded_from_alarms===true;
    if(hb.last_run_status==='success'&&okAgeH<=sk.maxGapH){p=pill('g','ran clean');kindCol='#1d9e75';green++;body.appendChild(el('div','nt','Heartbeat: succeeded '+torTime(okAt)+(okAgeH>20?' ('+fmtDay(okAt)+')':'')));}
    else if(hb.last_run_status&&hb.last_run_status!=='success'){p=pill(quiet?'a':'r',hb.last_run_status);kindCol=quiet?'#ef9f27':'#e24b4a';if(!quiet)attention++;body.appendChild(el('div','nt','Heartbeat reports '+hb.last_run_status+(okAt?' — last clean run '+fmtDay(okAt)+' '+torTime(okAt):'')));}
    else if(okAt&&okAgeH>sk.maxGapH){if(quiet){p=pill('a','gap (expected)');kindCol='#ef9f27';body.appendChild(el('div','nt','Last clean heartbeat '+fmtDay(okAt)+' '+torTime(okAt)+' — gaps are expected for this task (Mac asleep)'));}else{p=pill('r','stalled');kindCol='#e24b4a';attention++;body.appendChild(el('div','nt','Last clean heartbeat '+fmtDay(okAt)+' '+torTime(okAt)+' — '+Math.round(okAgeH)+'h ago, beyond its ~'+Math.round(sk.maxGapH)+'h cadence'));}}
    else{p=pill('n','heartbeat incomplete');body.appendChild(el('div','nt','Heartbeat row exists but carries no status/timestamp yet — expecting a report on its next run'));}
   }else{
   const last=parseTs(sk.last), mir=parseTs(sk.mirror);
   const asof=mir?(fmtDay(mir)+' '+torTime(mir)):'last';
   const ageH=(last&&mir)?(mir.getTime()-last.getTime())/3600000:Infinity;
   due++;
   if(!last){p=pill('a','never fired');kindCol='#ef9f27';attention++;body.appendChild(el('div','nt','Scheduler had no record of a run as of the '+asof+' mirror'));}
   else if(ageH<=sk.maxGapH){p=pill('g','fired');kindCol='#1d9e75';green++;body.appendChild(el('div','nt','Last fired '+fmtDay(last)+' '+torTime(last)+' (as of the '+asof+' mirror) — fired ≠ verified success'));}
   else{p=pill('r','stalled');kindCol='#e24b4a';attention++;body.appendChild(el('div','nt','Last fired '+fmtDay(last)+' '+torTime(last)+' — '+Math.round(ageH)+'h beyond cadence as of the '+asof+' mirror'));}
   }
  }else{
   const mine=runs.filter(r=>r.skill_name===sk.id&&r._day===today);
   const prev=runs.filter(r=>r.skill_name===sk.id&&r._day!==today);
   if(sk.kind==='multi'){
    const expected=sk.slots.filter(h=>h<=nowH-0.2).length;
    const got=mine.length;
    if(expected>0)due++;
    const worst=Math.max(0,...mine.map(r=>SEV[r.status]||2));
    if(got===0&&expected>0){p=pill('r','missed');kindCol='#e24b4a';attention++;}
    else if(got===0){p=pill('n','due 8:00 AM');}
    else if(worst>=3){p=pill('r','failed');kindCol='#e24b4a';attention++;}
    else if(worst===2||got<expected){p=pill('a','check');kindCol='#ef9f27';attention++;}
    else{p=pill('g','ran clean');kindCol='#1d9e75';green++;}
    body.appendChild(el('div','nt',got+'/'+expected+' fires so far today'+(mine[0]&&mine[0].notes?' · latest: '+mine[0].notes.slice(0,110):'')));
   }else{
    if(mine.length===0){
     if(nowH>sk.dueH+GRACE){p=pill('r','missed');kindCol='#e24b4a';due++;attention++;body.appendChild(el('div','nt','No run logged today — was due '+sk.due+(prev[0]?' · yesterday: '+prev[0].status:'')));}
     else if(nowH>=sk.dueH){p=pill('n','due now');body.appendChild(el('div','nt','In its run window'));}
     else{p=pill('n','due '+sk.due);if(prev[0])body.appendChild(el('div','nt','Yesterday: '+prev[0].status+(prev[0].notes?' — '+prev[0].notes.slice(0,100):'')));}
    }else{
     due++;
     const worst=Math.max(...mine.map(r=>SEV[r.status]||2));
     const worstRow=mine.find(r=>(SEV[r.status]||2)===worst);
     const t=torTime(worstRow._d);
     if(worst>=3){p=pill('r','failed');kindCol='#e24b4a';attention++;}
     else if(worst===2){p=pill('a','partial');kindCol='#ef9f27';attention++;}
     else{p=pill('g','ran clean');kindCol='#1d9e75';green++;}
     body.appendChild(el('div','nt',mine.length+(mine.length>1?' rows':' row')+' · '+t+(worstRow.notes?' — '+worstRow.notes.slice(0,130):'')));
    }
   }
   if(p&&(p.textContent==='missed'||p.textContent==='failed'||p.textContent==='partial')){
    const b=el('button',null,'Copy "investigate" for Claude');
    b.style.marginTop='6px';
    b.onclick=()=>copyPrompt("Investigate "+sk.id+"'s "+p.textContent+" run state on the run-health dashboard",b);
    body.appendChild(b);
   }
  }
  dot.style.background=kindCol;
  row.appendChild(dot);row.appendChild(body);if(p)row.appendChild(p);
  rowsBox.appendChild(row);
 }
 main.appendChild(rowsBox);
 const cards=el('div','cards');
 const mk=(l,v,s)=>{const c=el('div','card');c.appendChild(el('div','cl',l));c.appendChild(el('div','cv',String(v)));if(s)c.appendChild(el('div','cs',s));return c;};
 cards.appendChild(mk('Cron skills green today',green+' / '+due));
 cards.appendChild(mk('Decisions waiting',decisions,'on the follow-ups board'));
 cards.appendChild(mk('Skill flags',issues.length,'on the workshop board'));
 cards.appendChild(mk('Runs logged (40h)',runs.length));
 main.appendChild(cards);
 main.appendChild(el('p','sub',(schedOk?'Tracking every task on the schedule, mirrored nightly at 10 PM by the snapshot task'+(mirror?' (mirror as of '+fmtDay(mirror)+' '+torTime(mirror)+')':'')+'. ':'⚠ Schedule mirror unreachable — using the built-in fallback list, which can drift. ')+'Skills that write runs rows get full live status; scheduler-only tasks are judged by fire times as of the nightly mirror. The desktop board reads the scheduler live and stays canonical.'));
 renderHealth._banner=attention>0?[green+' green · '+attention+' need a look','a']:['All clear — '+green+' of '+due+' due ran clean','g'];
 setBanner(...renderHealth._banner);
}

/* ============ Account / settings ============ */
async function loadSettings(){
 const main=document.getElementById('v-settings');
 main.textContent='';
 const {data:s}=await sb.auth.getSession();
 const email=s&&s.session&&s.session.user?s.session.user.email:'';
 setBanner(email||'account','n');
 const card1=el('div','item');
 card1.appendChild(el('div','title','Change password'));
 card1.appendChild(el('p','sub','Pick something only you know. You’ll stay signed in.'));
 const f1=el('div','field');const l1=el('label',null,'New password');const i1=document.createElement('input');i1.type='password';i1.autocomplete='new-password';f1.appendChild(l1);f1.appendChild(i1);
 const f2=el('div','field');const l2=el('label',null,'New password again');const i2=document.createElement('input');i2.type='password';i2.autocomplete='new-password';f2.appendChild(l2);f2.appendChild(i2);
 card1.appendChild(f1);card1.appendChild(f2);
 const msg=el('div','mutedtxt','');
 const cb=el('button','primary','Update password');
 cb.style.marginTop='12px';
 cb.onclick=async()=>{
  msg.textContent='';
  if(i1.value.length<10){msg.textContent='Use at least 10 characters.';return;}
  if(i1.value!==i2.value){msg.textContent='The two entries don’t match.';return;}
  cb.disabled=true;cb.textContent='Updating…';
  const {error}=await sb.auth.updateUser({password:i1.value});
  cb.disabled=false;cb.textContent='Update password';
  if(error){msg.textContent='Could not update: '+error.message;}
  else{i1.value='';i2.value='';msg.textContent='Password updated ✓';}
 };
 card1.appendChild(cb);card1.appendChild(msg);
 main.appendChild(card1);
 const card2=el('div','item');
 card2.appendChild(el('div','title','Signed in as'));
 card2.appendChild(el('p','sub',email));
 const so=el('button',null,'Sign out');
 so.onclick=async()=>{await sb.auth.signOut();showLogin();};
 card2.appendChild(so);
 main.appendChild(card2);
 const card3=el('div','item');
 card3.appendChild(el('div','title','About'));
 card3.appendChild(el('p','sub','Forest Hill boards on your phone — the same four boards as the desktop dashboards, read straight from your private database over an authenticated session. Desktop stays the place for editing and for talking to Claude; this view is for reading and checking things off. Tip: in Safari, Share → Add to Home Screen makes this open like an app.'));
 main.appendChild(card3);
}

const LOADERS={updates:loadUpdates,clients:loadClients,followups:loadFollowups,workshop:loadWorkshop,health:loadHealth,settings:loadSettings};
const REBANNER={
 updates:()=>{if(renderUpdates._banner)setBanner(...renderUpdates._banner);},
 clients:()=>{if(renderClientPicker._banner)setBanner(...renderClientPicker._banner);},
 followups:()=>{if(renderFollowups._banner)setBanner(...renderFollowups._banner);},
 workshop:()=>{if(renderWorkshop._banner)setBanner(...renderWorkshop._banner);},
 health:()=>{if(renderHealth._banner)setBanner(...renderHealth._banner);},
 settings:()=>{}
};

/* boot */
(async()=>{
 const {data:s}=await sb.auth.getSession();
 if(s&&s.session) showApp(); else showLogin();
})();
</script>
